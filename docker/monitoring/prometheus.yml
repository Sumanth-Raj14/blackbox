global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: "blackbox-bom"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scheme: http
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["db:5432"]
    metrics_path: "/metrics"
    scheme: http

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: "/metrics"
