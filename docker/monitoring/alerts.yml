groups:
  - name: blackbox_bom_alerts
    interval: 30s
    rules:
      - alert: BackupStale
        expr: time() - backup_last_timestamp > 21600
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in over 6 hours"
          description: "Last backup was {{ $value | humanizeDuration }} ago"

      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }} per second over 5m"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time p95"
          description: "p95 response time is {{ $value }}s"

      - alert: DBQuerySlowness
        expr: rate(db_query_duration_seconds_sum[5m]) / rate(db_query_duration_seconds_count[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries"
          description: "Average DB query time is {{ $value }}s"
