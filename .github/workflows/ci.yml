name: Blackbox BOM CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly security scan Monday 6 AM

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt
      - name: Run ruff
        run: ruff check app/ --ignore=E501,E402
      - name: Run mypy
        run: mypy app/ --ignore-missing-imports || true

  lint-frontend:
    name: Lint & TypeCheck Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint . --ext .js,.jsx 2>/dev/null || true
      - name: TypeScript check
        run: npx tsc --noEmit 2>/dev/null || true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bom_user
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
          POSTGRES_DB: bom_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
      - name: Run migrations
        run: alembic upgrade head
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://bom_user:${{ secrets.CI_PG_PASSWORD }}@127.0.0.1:5432/bom_db
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: bom_user
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
          POSTGRES_DB: bom_db
          SECRET_KEY: ci-backend-signkey-donotuse-a1b2c3d4e5f60718293a4b5c6d7e
          ENCRYPTION_KEY: ci-backend-enckey-donotuse-b2c3d4e5f6a708192a3b4c5d9e0f
          S3_SECRET_KEY: ci-backend-s3key-donotuse-c3d4e5f6a7b809192a3b4c5d0e1f
          ADMIN_EMAIL: ci@blackbox-bom.com
          REDIS_URL: redis://localhost:6379/0
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --asyncio-mode=auto --cov=app --cov-report=xml --cov-report=term
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://bom_user:${{ secrets.CI_PG_PASSWORD }}@127.0.0.1:5432/bom_db
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: bom_user
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
          POSTGRES_DB: bom_db
          SECRET_KEY: ci-backend-signkey-donotuse-a1b2c3d4e5f60718293a4b5c6d7e
          ENCRYPTION_KEY: ci-backend-enckey-donotuse-b2c3d4e5f6a708192a3b4c5d9e0f
          S3_SECRET_KEY: ci-backend-s3key-donotuse-c3d4e5f6a7b809192a3b4c5d0e1f
          ADMIN_EMAIL: ci@blackbox-bom.com
          REDIS_URL: redis://localhost:6379/0
      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: backend/junit.xml
          reporter: java-junit

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install security tools
        run: pip install bandit safety pip-audit
      - name: Bandit SAST scan (fail on high-severity/high-confidence)
        run: bandit -r backend/app/ -f json -o bandit-report.json --severity-level high --confidence-level high
      - name: Safety dependency scan
        run: safety check -r backend/requirements.txt
      - name: pip-audit
        run: pip-audit -r backend/requirements.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: frontend

  recovery-test:
    name: Recovery Readiness Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test recovery readiness
        run: python scripts/recovery_test.py --dry-run
        working-directory: backend
        env:
          SECRET_KEY: ci-backend-signkey-donotuse-a1b2c3d4e5f60718293a4b5c6d7e
          ENCRYPTION_KEY: ci-backend-enckey-donotuse-b2c3d4e5f6a708192a3b4c5d9e0f
          ADMIN_EMAIL: ci@blackbox-bom.com

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_PG_PASSWORD }}
          SECRET_KEY: ci-build-signkey-donotuse-f0e1d2c3b4a5968778695a4b3c2d
          ENCRYPTION_KEY: build_encryption_key_32char!

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest tests
        run: npx vitest run --reporter=verbose

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend, security-scan, dependency-audit]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Verify host identity: pin the deploy host's key instead of blindly trusting it
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key $STAGING_USER@$STAGING_HOST "
            cd /opt/bom-tool &&
            docker compose pull api &&
            docker compose up -d --no-deps api &&
            docker compose exec api alembic upgrade head &&
            echo 'Deployment complete'
          "

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Verify host identity: pin the deploy host's key instead of blindly trusting it
          ssh-keyscan -H "$PRODUCTION_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -i ~/.ssh/deploy_key $PRODUCTION_USER@$PRODUCTION_HOST "
            cd /opt/bom-tool &&
            docker compose pull api &&
            docker compose up -d --no-deps api &&
            docker compose exec api alembic upgrade head &&
            echo 'Production deployment complete'
          "

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend, security-scan, dependency-audit, recovery-test, docker-build, build-frontend, build-and-push, deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Check overall status
        run: |
          echo "## CI/CD Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint | ${{ needs.lint-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint | ${{ needs.lint-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Recovery Test | ${{ needs.recovery-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Production | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Overall** | **${{ contains(needs.*.result, 'failure') && 'FAILURE' || 'SUCCESS' }}** |" >> $GITHUB_STEP_SUMMARY
