  <meta name="twitter:card" content="summary_large_image"/>

  <link rel="stylesheet" href="bbf.css"/>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root">
    <div id="app-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FFFFFF;color:#5D5D5D;font-family:'Montserrat',system-ui,sans-serif;">
      <div style="text-align:center;">
        <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;width:28px;height:28px;margin:0 auto 20px;padding:3px;background:#F5F5F5;border-radius:4px;border:1px solid #E5E5E5;">
          <span style="background:#5D5D5D;border-radius:1px;"></span>
          <span style="background:#5D5D5D;border-radius:1px;"></span>
          <span style="background:#5D5D5D;border-radius:1px;"></span>
          <span style="background:#B5BC38;border-radius:1px;"></span>
        </div>
        <div style="font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;letter-spacing:0.18em;margin-bottom:4px;color:#000000;">&lt;&lt; BLACKBOX</div>
        <div style="font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.12em;color:#B5BC38;">BOM</div>
        <div style="margin-top:20px;display:flex;gap:8px;align-items:center;justify-content:center;">
          <span style="width:5px;height:5px;background:#B5BC38;border-radius:50%;animation:bl 0.8s ease-in-out infinite;"></span>
          <span style="width:5px;height:5px;background:#B5BC38;border-radius:50%;animation:bl 0.8s ease-in-out infinite 0.2s;"></span>
          <span style="width:5px;height:5px;background:#B5BC38;border-radius:50%;animation:bl 0.8s ease-in-out infinite 0.4s;"></span>
        </div>
        <div id="load-status" style="margin-top:16px;font-family:'Montserrat',sans-serif;font-size:11px;color:#888888;letter-spacing:0.05em;"></div>
      </div>
    </div>
    <style>@keyframes bl{0%,100%{opacity:0.3}50%{opacity:1}}</style>
  </div>

  <script>
    // Error display for development
    window.addEventListener('error', function(e) {
      var el = document.getElementById('load-status');
      if (el) el.innerHTML += '<div style="color:red;margin:4px 0">ERROR: ' + (e.message || e.filename || 'unknown') + ' (line ' + (e.lineno || '?') + ')</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('load-status');
      if (el) el.innerHTML += '<div style="color:orange;margin:4px 0">PROMISE REJECTION: ' + (e.reason?.message || 'unknown') + '</div>';
    });
  </script>

  <!-- Vite entry point (ESM, JSX transformed automatically) -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
