# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sys.path for import
prepend_sys_path = .
path_separator = os

# sqlalchemy.url - overridden by env.py from DATABASE_URL/DATABASE_URI env var,
# or set via environment variables. Default below is for local dev only.
sqlalchemy.url = postgresql+asyncpg://bom_user:@localhost:5432/bom_db

# timezone to use when rendering the date
# within the migration file as well as the filename.
# If specified, requires the python>=3.9 or backports.zoneinfo library.
# Any required timezone provider package is listed in requirements.
# timezone =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
