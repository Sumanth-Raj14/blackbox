# ═══════════════════════════════════════════════════════════════
# Blackbox BOM — DDoS-Immune Enterprise Nginx Configuration
# ═══════════════════════════════════════════════════════════════
# Layered defense: rate limiting, connection limiting, request
# validation, bot blocking, load shedding, and proxy hardening.
# ═══════════════════════════════════════════════════════════════

# ── Core Settings ──────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
    accept_mutex_delay 100ms;
}

http {
    # ── Security: Hide server identity ─────────────────────────
    server_tokens off;
    proxy_hide_header "X-Powered-By";
    proxy_hide_header "x-powered-by";

    # ── Rate Limiting Zones (shared memory) ────────────────────
    # Each zone: <key> <size> rate=<requests>/<window>
    limit_req_zone $binary_remote_addr zone=api:100m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:50m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=search:50m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=import_export:50m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=websocket:50m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=file_upload:50m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin:50m rate=10r/s;

    # Per-IP connection limit zone
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:50m;

    # Per-IP request burst detection (for DDoS early warning)
    limit_req_zone $binary_remote_addr zone=ddos_warning:100m rate=100r/s;

    # ── Request Size & Buffer Hardening (Slowloris / RUDY) ────
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;
    keepalive_requests 200;
    lingering_close on;
    lingering_time 30s;
    lingering_timeout 5s;

    client_body_buffer_size 8k;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    client_max_body_size 10M;

    # ── Proxy Buffer Hardening ─────────────────────────────────
    proxy_buffer_size 4k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 10s;

    # ── Real IP from proxy / cloud ─────────────────────────────
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ── Upstream: API Backend ──────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:8000 max_fails=5 fail_timeout=30s weight=10;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 30s;
    }

    # ── MIME Types ─────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    log_not_found off;

    # ── Gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # ── Open File Cache ────────────────────────────────────────
    open_file_cache max=5000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # ── Limit HTTP Methods (reject non-standard) ───────────────
    map $request_method $bad_method {
        default 0;
        "GET"    0;
        "HEAD"   0;
        "POST"   0;
        "PUT"    0;
        "PATCH"  0;
        "DELETE" 0;
        "OPTIONS" 0;
    }

    # ── Block HTTP/1.0 (used by scanners) ─────────────────────
    map $server_protocol $bad_protocol {
        default     0;
        "HTTP/1.0"  1;
        "HTTP/0.9"  1;
    }

    # ── Bot Detection: known bad user agents ───────────────────
    map $http_user_agent $bad_bot {
        default 0;
        ~*(curl|wget|python-requests|python-urllib|go-http-client|java/|scrapy|masscan|nikto|sqlmap|nmap|acunetix|nessus|openvas|burpsuite|zap|fiddler|postmanruntime|jmeter|gobuster|dirbuster|wfuzz|hydra) 1;
        ~*(AhrefsBot|SemrushBot|MegaIndex|DotBot|MauiBot|MJ12bot|BLEXBot|Exabot|YandexBot|Seznami|ZoominfoBot|Screaming Frog|NetcraftSurveyAgent) 1;
    }

    # ── Empty User-Agent → scanner ────────────────────────────
    map $http_user_agent $empty_ua {
        ""    1;
        default 0;
    }

    # ── Referrer Validation (block spoofed) ────────────────────
    map $http_referer $bad_referer {
        default 0;
        "" 0;
        ~*(spam|porn|casino|gambling|sex|dating|viagra) 1;
    }

    # ── Load Shedding: Rate-Limit Based (adaptive via zone) ─────
    # NOTE: split_clients was removed because it permanently drops 10%
    # of traffic unconditionally. Nginx cannot do adaptive load shedding
    # natively. Use the rate-limiting zones above instead, or integrate
    # with an external load-shedding controller.

    # ── HTTP → HTTPS Redirect (production) ────────────────────
    server {
        listen 80 backlog=65535 reuseport;
        listen [::]:80 backlog=65535 reuseport;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ── Server Block (HTTPS) ──────────────────────────────────
    server {
        listen 443 ssl http2 backlog=65535 reuseport;
        listen [::]:443 ssl http2 backlog=65535 reuseport;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # ── SSL Configuration (generate self-signed for dev) ──
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ════════════════════════════════════════════════════════
        # LAYER 1: REJECT MALFORMED / SCANNER TRAFFIC
        # ════════════════════════════════════════════════════════

        # Block HTTP/1.0 (scanners, legacy clients)
        if ($bad_protocol) {
            return 426;
        }

        # Block non-standard HTTP methods
        if ($bad_method) {
            return 405;
        }

        # Block empty User-Agent (bots, scanners)
        if ($empty_ua) {
            return 403;
        }

        # Block known bad bots
        if ($bad_bot) {
            return 403;
        }

        # Block spam referrers
        if ($bad_referer) {
            return 403;
        }

        # ════════════════════════════════════════════════════════
        # LAYER 2: DDoS EARLY DETECTION — rate limiting
        # ════════════════════════════════════════════════════════
        # (load shedding via rate-limit zones above)

        # ════════════════════════════════════════════════════════
        # LAYER 3: SECURITY HEADERS
        # ════════════════════════════════════════════════════════
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Content-Security-Policy: strict without unsafe-eval
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'none'; report-uri /api/v1/csp-report;" always;

        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), fullscreen=(self)" always;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-RateLimit-Limit "30" always;

        # ════════════════════════════════════════════════════════
        # LAYER 4: CONNECTION & RATE LIMITING
        # ════════════════════════════════════════════════════════
        limit_conn conn_per_ip 10;
        limit_conn_log_level warn;
        limit_conn_status 429;

        # Global rate limit catch-all
        limit_req zone=ddos_warning burst=200 nodelay;
        limit_req_log_level error;
        limit_req_status 429;

        # ════════════════════════════════════════════════════════
        # LAYER 5: BLOCK ATTACK PATTERNS
        # ════════════════════════════════════════════════════════

        # SQL injection, XSS, path traversal, command injection
        if ($request_uri ~* "(<script|%3Cscript|union.*select.*from|eval\(|base64_encode|benchmark|sleep\(|pg_sleep|waitfor|delay|@@version|char\(|0x[0-9a-f]{6,}|\.\./|\.\.%2f|etc/passwd|proc/self/environ|wget\s+http|certutil|powershell|cmd\.exe|/bin/sh)") {
            return 403;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Frontend Static Files (CDN-ready)
        # ════════════════════════════════════════════════════════
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600, immutable" always;
            limit_conn conn_per_ip 20;
            limit_rate 5m;  # Bandwidth throttle per connection
            expires 1h;
        }

        # Static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable" always;
            access_log off;
            limit_rate 10m;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Auth (strictest rate limit)
        # ════════════════════════════════════════════════════════
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_log_level warn;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            # Extra auth endpoint hardening
            limit_except GET POST OPTIONS {
                deny all;
            }
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Search (moderate rate limit)
        # ════════════════════════════════════════════════════════
        location /api/v1/search {
            limit_req zone=search burst=15 nodelay;
            limit_req_log_level warn;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_except GET POST OPTIONS {
                deny all;
            }
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Import/Export (strict + large body)
        # ════════════════════════════════════════════════════════
        location ~ ^/api/v1/(import|export) {
            limit_req zone=import_export burst=3 nodelay;
            limit_req_log_level warn;
            client_max_body_size 100M;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            limit_except POST OPTIONS {
                deny all;
            }
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: File Upload (strict + large body)
        # ════════════════════════════════════════════════════════
        location /api/v1/upload {
            limit_req zone=file_upload burst=5 nodelay;
            limit_req_log_level warn;
            client_max_body_size 100M;
            client_body_buffer_size 128k;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Backup endpoints (superuser only, strict)
        # ════════════════════════════════════════════════════════
        location /api/v1/backup/ {
            limit_req zone=admin burst=5 nodelay;
            limit_conn conn_per_ip 2;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: General API (with caching for GET)
        # ════════════════════════════════════════════════════════
        location /api {
            limit_req zone=api burst=30 nodelay;
            limit_req_log_level warn;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache successful GET responses (5s)
            proxy_cache_valid 200 5s;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 2s;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: WebSocket (long-lived)
        # ════════════════════════════════════════════════════════
        location /ws {
            limit_req zone=websocket burst=2 nodelay;
            limit_req_log_level warn;
            limit_conn conn_per_ip 3;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Health Check (no rate limit)
        # ════════════════════════════════════════════════════════
        location /health {
            access_log off;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_cache_bypass 1;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: Metrics (internal only)
        # ════════════════════════════════════════════════════════
        location /metrics {
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
            proxy_pass http://api_backend;
        }

        # ════════════════════════════════════════════════════════
        # LOCATION: CSP Report Endpoint
        # ════════════════════════════════════════════════════════
        location /api/v1/csp-report {
            access_log off;
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ════════════════════════════════════════════════════════
        # DENY: Hidden files
        # ════════════════════════════════════════════════════════
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ════════════════════════════════════════════════════════
        # DENY: Sensitive paths
        # ════════════════════════════════════════════════════════
        location ~ (\.env|\.git|composer\.json|package\.json|package-lock\.json|Dockerfile|docker-compose|alembic\.ini|alembic) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ════════════════════════════════════════════════════════
        # ERROR PAGES
        # ════════════════════════════════════════════════════════
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>429 Too Many Requests</title></head><body><h1>429 Too Many Requests</h1><p>Rate limit exceeded. Please slow down.</p></body></html>';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            root /usr/share/nginx/html;
        }

        error_page 403 /403.html;
        location = /403.html {
            internal;
            default_type text/html;
            return 403 '<!DOCTYPE html><html><head><title>403 Forbidden</title></head><body><h1>403 Forbidden</h1><p>Access denied.</p></body></html>';
        }

        error_page 405 /405.html;
        location = /405.html {
            internal;
            default_type text/html;
            return 405 '<!DOCTYPE html><html><head><title>405 Method Not Allowed</title></head><body><h1>405 Method Not Allowed</h1></body></html>';
        }

        error_page 426 /426.html;
        location = /426.html {
            internal;
            default_type text/html;
            return 426 '<!DOCTYPE html><html><head><title>426 Upgrade Required</title></head><body><h1>426 Upgrade Required</h1><p>HTTP/1.1 or higher is required.</p></body></html>';
        }
    }
}
