version: '3.8'

services:
  postgres:
    # TODO: pin by digest in CI
    image: postgres:15
    container_name: bom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bom_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Set it in .env or environment.}
      POSTGRES_DB: ${POSTGRES_DB:-bom_db}
      # WAL archiving for point-in-time recovery
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./wal_archive:/var/lib/postgresql/wal_archive
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bom_user -d bom_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bom_net
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"

  redis:
    image: redis:7-alpine
    container_name: bom_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-bom_redis_secret}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-bom_redis_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bom_net

  api:
    # TODO: Pin python:3.11-slim base image in Dockerfile to a SHA256 digest
    build: .
    container_name: bom_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bom_user}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-bom_db}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-bom_redis_secret}@redis:6379/0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-bom_redis_secret}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required. Set it in .env or environment.}
      - ALGORITHM=RS256
      - RSA_KEY_DIR=${RSA_KEY_DIR:-/rsa_keys}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - BACKUP_DIR=${BACKUP_DIR:-/app/backups}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-20}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost:8000'); c.request('GET','/api/v1/health'); r=c.getresponse(); exit(0) if r.status==200 else exit(1)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bom_net
    volumes:
      - backup_data:/app/backups

  pgbouncer:
    # TODO: Pin to SHA256 digest
    image: bitnami/pgbouncer:1.23
    container_name: bom_pgbouncer
    restart: unless-stopped
    environment:
      - PGBOUNCER_DATABASE=bom_db
      - PGBOUNCER_HOST=postgres
      - PGBOUNCER_PORT=5432
      - PGBOUNCER_USER=${POSTGRES_USER:-bom_user}
      - PGBOUNCER_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required.}
      - PGBOUNCER_AUTH_TYPE=scram-sha-256
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_DEFAULT_POOL_SIZE=25
      - PGBOUNCER_MAX_CLIENT_CONN=200
      - PGBOUNCER_QUERY_TIMEOUT=30
      - PGBOUNCER_IDLE_TRANSACTION_TIMEOUT=300
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bom_net

  nginx:
    image: nginx:stable-alpine
    container_name: bom_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - bom_net

volumes:
  postgres_data:
  wal_archive:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local

networks:
  bom_net:
    driver: bridge
