[databases]
bom_db = host=postgres port=5432 dbname=bom_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 25
max_client_conn = 200
max_db_connections = 50
idle_transaction_timeout = 300
query_timeout = 30
server_idle_timeout = 600
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5
log_connections = 1
log_disconnections = 1
verbose = 0
