global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:25"
  smtp_from: "alertmanager@blackbox-bom.com"
  smtp_require_tls: false

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "default"
      repeat_interval: 4h

receivers:
  - name: "default"
    email_configs:
      - to: "admin@blackbox-bom.com"
        send_resolved: true

  - name: "critical"
    email_configs:
      - to: "admin@blackbox-bom.com"
        send_resolved: true
    webhook_configs:
      - url: "http://webhook-service:8080/alert"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
